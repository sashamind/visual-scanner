<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>data.scan</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }

    .header {
      width: 100%; max-width: 640px;
      padding: 12px 12px 8px;
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid #222;
    }
    .header-title { font-size: 0.75rem; letter-spacing: 4px; color: #fff; }
    .header-sub   { font-size: 0.5rem; color: #444; letter-spacing: 2px; }

    .scanner-wrapper {
      position: relative; width: 100%; max-width: 640px;
      aspect-ratio: 4/3; background: #000; overflow: hidden;
    }

    #video, #offscreen { display: none; }
    #canvas { display: block; width: 100%; height: 100%; }

    .scan-line {
      position: absolute; top: 0; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 1px; background: #fff; opacity: 0.8;
      pointer-events: none; z-index: 10;
    }
    .tick {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 7px; height: 1px; background: #fff; z-index: 11;
    }
    .tick.t { top: 0; } .tick.b { bottom: 0; }

    #audioStatus {
      position: absolute; bottom: 8px; left: 10px;
      font-size: 0.45rem; color: #444; letter-spacing: 2px; z-index: 15;
    }

    .live-data {
      position: absolute; bottom: 8px; right: 10px;
      font-size: 0.45rem; color: #555; letter-spacing: 2px;
      z-index: 15; text-align: right; line-height: 1.8;
    }

    /* Индикатор ноты — загорается когда играет нота */
    #noteDisplay {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem; letter-spacing: 3px; color: rgba(255,255,255,0.5);
      z-index: 15; transition: opacity 0.3s;
    }

    #startOverlay {
      position: absolute; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; cursor: pointer; gap: 16px;
    }
    .overlay-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .overlay-label { font-size: 0.55rem; letter-spacing: 5px; color: #444; z-index: 1; }
    .overlay-tap {
      font-size: 0.65rem; letter-spacing: 4px; color: #fff;
      border: 1px solid #fff; padding: 10px 28px; z-index: 1;
      animation: blink 1.4s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    #vizCanvas {
      width: 100%; max-width: 640px; height: 48px;
      display: block; background: #000; border-top: 1px solid #1a1a1a;
    }

    .data-row {
      width: 100%; max-width: 640px;
      display: grid; grid-template-columns: repeat(4,1fr);
      border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a;
    }
    .data-cell { padding: 8px 10px; border-right: 1px solid #1a1a1a; }
    .data-cell:last-child { border-right: none; }
    .dc-label { font-size:0.38rem; color:#444; letter-spacing:2px; margin-bottom:3px; text-transform:uppercase; }
    .dc-val   { font-size:0.7rem; color:#fff; }

    .section { width: 100%; max-width: 640px; }
    .section-head {
      font-size: 0.4rem; color: #333; letter-spacing: 3px;
      padding: 10px 10px 0; text-transform: uppercase; border-top: 1px solid #111;
    }

    .sound-modes { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid #1a1a1a; }
    .smode-btn {
      padding: 12px 10px; border:none; border-right:1px solid #1a1a1a;
      background:#000; color:#444;
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:2px; cursor:pointer;
      text-align:left; line-height:1.8; transition:background 0.1s;
    }
    .smode-btn:last-child { border-right:none; }
    .smode-btn .smode-name { display:block; }
    .smode-btn .smode-desc { font-size:0.38rem; color:#333; letter-spacing:1px; display:block; }
    .smode-btn.active { background:#fff; color:#000; }
    .smode-btn.active .smode-desc { color:#666; }
    .smode-btn:active { background:#111; color:#fff; }

    .wave-modes { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid #1a1a1a; }
    .wave-btn {
      padding:10px 0; border:none; border-right:1px solid #1a1a1a;
      background:#000; color:#444;
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:2px; cursor:pointer; transition:background 0.1s;
    }
    .wave-btn:last-child { border-right:none; }
    .wave-btn.active { background:#fff; color:#000; }
    .wave-btn:active  { background:#111; color:#fff; }

    .sliders { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid #1a1a1a; }
    .slider-cell { padding:10px 12px; border-right:1px solid #1a1a1a; }
    .slider-cell:nth-child(even) { border-right:none; }
    .slider-cell:nth-child(3), .slider-cell:nth-child(4) { border-top:1px solid #1a1a1a; }
    .sl-label {
      font-size:0.4rem; color:#444; letter-spacing:2px;
      display:flex; justify-content:space-between; margin-bottom:8px; text-transform:uppercase;
    }
    .sl-label span { color:#fff; }
    input[type="range"] {
      -webkit-appearance:none; width:100%; height:1px; background:#333; outline:none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance:none; width:16px; height:16px;
      border-radius:0; background:#fff; cursor:pointer;
    }

    .bottom-btns {
      display:grid; grid-template-columns:1fr 1fr;
      border-bottom:1px solid #1a1a1a; margin-bottom:24px;
    }
    .ctrl-btn {
      padding:12px; border:none; border-right:1px solid #1a1a1a;
      background:#000; color:#444;
      font-family:'Share Tech Mono',monospace;
      font-size:0.6rem; letter-spacing:2px; cursor:pointer; transition:background 0.1s;
    }
    .ctrl-btn:last-child { border-right:none; }
    .ctrl-btn.active { color:#fff; }
    .ctrl-btn:active  { background:#111; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">DATA.SCAN</div>
    <div class="header-sub">visual → audio</div>
  </div>

  <div class="scanner-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <canvas id="offscreen" width="640" height="480"></canvas>
    <div class="scan-line"></div>
    <div class="tick t"></div>
    <div class="tick b"></div>
    <div id="noteDisplay"></div>
    <div id="audioStatus">audio: —</div>
    <div class="live-data">
      <div id="liveLum">lum —</div>
      <div id="liveNote">— </div>
    </div>
    <div id="startOverlay">
      <div class="overlay-grid"></div>
      <div class="overlay-label">DATA.SCAN / visual→audio</div>
      <div class="overlay-tap">[ tap to start ]</div>
    </div>
  </div>

  <canvas id="vizCanvas" width="640" height="48"></canvas>

  <div class="data-row">
    <div class="data-cell"><div class="dc-label">lum</div><div class="dc-val" id="infoLum">—</div></div>
    <div class="data-cell"><div class="dc-label">note</div><div class="dc-val" id="infoNote">—</div></div>
    <div class="data-cell"><div class="dc-label">mode</div><div class="dc-val" id="infoMode">raw</div></div>
    <div class="data-cell"><div class="dc-label">state</div><div class="dc-val" id="infoState">—</div></div>
  </div>

  <div class="section">
    <div class="section-head">// sound.mode</div>
    <div class="sound-modes">
      <button class="smode-btn active" data-smode="raw">
        <span class="smode-name">RAW</span>
        <span class="smode-desc">атональный дрон</span>
      </button>
      <button class="smode-btn" data-smode="musical">
        <span class="smode-name">MUSICAL</span>
        <span class="smode-desc">ambient piano</span>
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">// wave.type (only raw)</div>
    <div class="wave-modes">
      <button class="wave-btn active" data-mode="sine">SINE</button>
      <button class="wave-btn" data-mode="triangle">TRI</button>
      <button class="wave-btn" data-mode="sawtooth">SAW</button>
      <button class="wave-btn" data-mode="square">SQR</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">// parameters</div>
    <div class="sliders">
      <div class="slider-cell">
        <div class="sl-label">volume <span id="volVal">80%</span></div>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
      </div>
      <div class="slider-cell">
        <div class="sl-label">voices <span id="voiceVal">8</span></div>
        <input type="range" id="voicesSlider" min="1" max="16" step="1" value="8">
      </div>
      <div class="slider-cell">
        <div class="sl-label">min.hz <span id="minVal">100</span></div>
        <input type="range" id="minFreqSlider" min="50" max="500" step="10" value="100">
      </div>
      <div class="slider-cell">
        <div class="sl-label">max.hz <span id="maxVal">2000</span></div>
        <input type="range" id="maxFreqSlider" min="500" max="4000" step="50" value="2000">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">// controls</div>
    <div class="bottom-btns">
      <button class="ctrl-btn active" id="muteBtn">[ sound: on ]</button>
      <button class="ctrl-btn" id="camBtn">[ cam: rear ]</button>
    </div>
  </div>

<script>
// ════════════════════════════════════════════
//  ЭЛЕМЕНТЫ
// ════════════════════════════════════════════
const video        = document.getElementById('video');
const canvas       = document.getElementById('canvas');
const offscreen    = document.getElementById('offscreen');
const vizCanvas    = document.getElementById('vizCanvas');
const startOverlay = document.getElementById('startOverlay');
const muteBtn      = document.getElementById('muteBtn');
const camBtn       = document.getElementById('camBtn');
const audioStatus  = document.getElementById('audioStatus');
const noteDisplay  = document.getElementById('noteDisplay');
const volumeSlider  = document.getElementById('volumeSlider');
const voicesSlider  = document.getElementById('voicesSlider');
const minFreqSlider = document.getElementById('minFreqSlider');
const maxFreqSlider = document.getElementById('maxFreqSlider');

const ctx    = canvas.getContext('2d');
const offCtx = offscreen.getContext('2d');
const vizCtx = vizCanvas.getContext('2d');

// ════════════════════════════════════════════
//  СОСТОЯНИЕ
// ════════════════════════════════════════════
let audioCtx     = null;
let masterGain   = null;
let analyser     = null;
let reverbNode   = null;
let dryGain      = null;
let wetGain      = null;
let oscillators  = [];  // для RAW режима
let gainNodes    = [];
let isMuted      = false;
let isRunning    = false;
let waveType     = 'sine';
let soundMode    = 'raw';
let animId       = null;
let useFrontCam  = false;
let audioReady   = false;
let startHandled = false;
let frameCount   = 0;

// ════════════════════════════════════════════
//  PIANO ENGINE — движок для musical режима
//  Работает совсем иначе чем RAW:
//  не постоянные осцилляторы, а одноразовые "удары"
// ════════════════════════════════════════════

// Пентатоника — C минор, 3 октавы (средний диапазон фортепиано)
// Специально убрал очень высокие ноты которые дают писк
const NOTES = {
  'C3':  130.81, 'Eb3': 155.56, 'F3':  174.61, 'G3':  196.00, 'Bb3': 233.08,
  'C4':  261.63, 'Eb4': 311.13, 'F4':  349.23, 'G4':  392.00, 'Bb4': 466.16,
  'C5':  523.25, 'Eb5': 622.25, 'F5':  698.46, 'G5':  783.99, 'Bb5': 932.33,
};
const NOTE_NAMES = Object.keys(NOTES);
const NOTE_FREQS = Object.values(NOTES);

// Бас — только нижние ноты
const BASS_NOTES = [65.41, 77.78, 87.31, 98.00, 116.54]; // C2-Bb2

// Состояние piano engine
let lastNoteIndex  = -1;   // последняя сыгранная нота
let noteCooldown   = 0;    // кулдаун между нотами (в кадрах)
let noteHoldTimer  = null; // таймер удержания ноты
let prevBright     = 0;    // яркость предыдущего кадра
let kickCooldown   = 0;
let snareCooldown  = 0;
let hihatCooldown  = 0;
let bassOsc        = null;
let bassGainNode   = null;

// ════════════════════════════════════════════
//  НОТЫ ПЕНТАТОНИКИ — имена для отображения
// ════════════════════════════════════════════
const NOTE_LABELS = ['C','Eb','F','G','Bb'];

// ════════════════════════════════════════════
//  iOS ФИКСЫ
// ════════════════════════════════════════════
function switchToMediaChannel() {
  return new Promise(resolve => {
    const a = document.createElement('audio');
    a.setAttribute('playsinline', '');
    a.src = 'data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjU0AAAAAAAAAAAAAAAAJAAAAAAAAAAAASDs90hvAAAAAAAAAAAAAAAAAAAA//tQZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';
    a.volume = 0.001;
    a.play().then(() => { setTimeout(() => { a.pause(); a.remove(); resolve(); }, 200); })
            .catch(() => resolve());
  });
}

function unlockWebAudio(actx) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.frequency.value = 440;
  g.gain.setValueAtTime(0.001, actx.currentTime);
  g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.1);
  o.connect(g); g.connect(actx.destination);
  o.start(actx.currentTime); o.stop(actx.currentTime + 0.15);
}

// ════════════════════════════════════════════
//  РЕВЕРБ — имитация концертного зала
// ════════════════════════════════════════════
function createReverb() {
  reverbNode = audioCtx.createConvolver();
  // 3 секунды затухания — как в большом зале
  const len = audioCtx.sampleRate * 3;
  const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
  }
  reverbNode.buffer = buf;

  dryGain = audioCtx.createGain();
  wetGain = audioCtx.createGain();
  dryGain.gain.value = 1.0;
  wetGain.gain.value = 0.0;

  analyser.connect(dryGain);
  analyser.connect(reverbNode);
  reverbNode.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(masterGain);
}

// ════════════════════════════════════════════
//  ИНИЦИАЛИЗАЦИЯ АУДИО
// ════════════════════════════════════════════
async function initAudio() {
  if (audioCtx && audioCtx.state === 'running' && audioReady) return;
  await switchToMediaChannel();
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  try { await audioCtx.resume(); } catch(e) {}
  unlockWebAudio(audioCtx);
  await new Promise(r => setTimeout(r, 200));
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  if (!masterGain) {
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(volumeSlider.value);
    createReverb();
    masterGain.connect(audioCtx.destination);
  }

  // RAW осцилляторы создаём сразу
  createRawOscillators();
  audioReady = true;
  updateAudioStatus();
}

// ════════════════════════════════════════════
//  RAW ОСЦИЛЛЯТОРЫ — постоянные, меняют частоту
// ════════════════════════════════════════════
function createRawOscillators() {
  oscillators.forEach(o => { try { o.stop(); } catch(e) {} });
  oscillators = []; gainNodes = [];
  const count = parseInt(voicesSlider.value);
  const now   = audioCtx.currentTime;
  for (let i = 0; i < count; i++) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = waveType;
    osc.frequency.value = 200 + i * 30;
    gain.gain.setValueAtTime(0, now);
    osc.connect(gain); gain.connect(analyser);
    osc.start(now);
    oscillators.push(osc); gainNodes.push(gain);
  }
  document.getElementById('infoNote').textContent = '—';
}

// ════════════════════════════════════════════
//  PIANO NOTE — одиночный удар по клавише
//  Это и есть секрет фортепианного звука:
//  каждая нота = отдельный осциллятор который
//  быстро нарастает и медленно затихает
// ════════════════════════════════════════════
function playPianoNote(freq, noteName, velocity = 0.7) {
  if (!audioCtx || isMuted) return;
  const now = audioCtx.currentTime;
  const vol = parseFloat(volumeSlider.value) * velocity;

  // ── Основной тон ──
  const osc1  = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = 'sine';
  osc1.frequency.value = freq;

  // ── Второй обертон (октава выше, тихий) ──
  // Делает звук богаче как настоящее фортепиано
  const osc2  = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;

  // ── Третий обертон (квинта, очень тихий) ──
  const osc3  = audioCtx.createOscillator();
  const gain3 = audioCtx.createGain();
  osc3.type = 'triangle';
  osc3.frequency.value = freq * 3;

  // ОГИБАЮЩАЯ ФОРТЕПИАНО:
  // Атака очень быстрая (0.008с) — резкий удар
  // Затем быстрый спад (0.1с) — характерный "щипок"
  // Потом долгое медленное затухание (2с) — резонанс струны

  // Основной тон
  gain1.gain.setValueAtTime(0, now);
  gain1.gain.linearRampToValueAtTime(vol, now + 0.008);        // атака
  gain1.gain.linearRampToValueAtTime(vol * 0.6, now + 0.1);    // спад
  gain1.gain.exponentialRampToValueAtTime(0.001, now + 2.5);   // затухание

  // Октава — тихая, быстро затихает
  gain2.gain.setValueAtTime(0, now);
  gain2.gain.linearRampToValueAtTime(vol * 0.25, now + 0.008);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

  // Квинта — совсем тихая
  gain3.gain.setValueAtTime(0, now);
  gain3.gain.linearRampToValueAtTime(vol * 0.1, now + 0.008);
  gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

  // Подключаем всё к analyser (через который идёт реверб)
  osc1.connect(gain1); gain1.connect(analyser);
  osc2.connect(gain2); gain2.connect(analyser);
  osc3.connect(gain3); gain3.connect(analyser);

  // Запускаем и останавливаем автоматически
  osc1.start(now); osc1.stop(now + 2.6);
  osc2.start(now); osc2.stop(now + 1.3);
  osc3.start(now); osc3.stop(now + 0.9);

  // Показываем ноту на экране
  noteDisplay.textContent = noteName;
  noteDisplay.style.opacity = '1';
  clearTimeout(noteHoldTimer);
  noteHoldTimer = setTimeout(() => { noteDisplay.style.opacity = '0'; }, 1500);

  document.getElementById('infoNote').textContent  = noteName;
  document.getElementById('liveNote').textContent  = noteName;
}

// ════════════════════════════════════════════
//  БАС — отдельный тихий нижний тон
// ════════════════════════════════════════════
function playBassNote(freq, velocity = 0.5) {
  if (!audioCtx || isMuted) return;
  const now = audioCtx.currentTime;
  const vol = parseFloat(volumeSlider.value) * velocity * 0.6;

  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filt = audioCtx.createBiquadFilter();

  osc.type = 'sine';
  osc.frequency.value = freq;
  filt.type = 'lowpass';
  filt.frequency.value = 300;

  // Бас дольше затихает — держит гармонию
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);

  osc.connect(filt); filt.connect(gain);
  gain.connect(masterGain); // бас напрямую — без реверба (плотнее)
  osc.start(now); osc.stop(now + 3.6);
}

// ════════════════════════════════════════════
//  УДАРНЫЕ
// ════════════════════════════════════════════
function playKick(vol) {
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(100, now);
  o.frequency.exponentialRampToValueAtTime(28, now + 0.4);
  g.gain.setValueAtTime(vol * 0.8, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
  o.connect(g); g.connect(masterGain);
  o.start(now); o.stop(now + 0.5);
}

function playHihat(vol, open = false) {
  const now = audioCtx.currentTime;
  const dur = open ? 0.15 : 0.04;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f   = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 9000;
  const g   = audioCtx.createGain();
  g.gain.setValueAtTime(vol * 0.4, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.connect(f); f.connect(g); g.connect(masterGain);
  src.start(now);
}

// ════════════════════════════════════════════
//  КАМЕРА
// ════════════════════════════════════════════
async function startCamera() {
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: useFrontCam ? 'user' : 'environment',
               width:{ideal:1280}, height:{ideal:960} },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();
    isRunning = true;
    scanLoop();
  } catch(e) { audioStatus.textContent = 'cam: ' + e.message; }
}

// ════════════════════════════════════════════
//  ГЛАВНЫЙ ЦИКЛ
// ════════════════════════════════════════════
function scanLoop() {
  if (!isRunning) return;
  if (video.readyState >= 2) {
    offCtx.drawImage(video, 0, 0, 640, 480);
    const frame = offCtx.getImageData(0, 0, 640, 480);
    processFrame(frame.data);
    drawVisualizer();
  }
  animId = requestAnimationFrame(scanLoop);
  frameCount++;
}

// ════════════════════════════════════════════
//  ОБРАБОТКА КАДРА
// ════════════════════════════════════════════
function processFrame(data) {
  const W = 640, H = 480;
  const out = ctx.createImageData(W, H);
  const outD = out.data;
  const scanX = W / 2, scanW = 5;
  const scanCol = new Float32Array(H);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i    = (y * W + x) * 4;
      const gray = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
      if (x >= scanX - scanW && x <= scanX + scanW) scanCol[y] = gray;
      outD[i] = outD[i+1] = outD[i+2] = gray;
      outD[i+3] = 255;
    }
  }

  ctx.putImageData(out, 0, 0);

  // Сетка Ikeda
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Средняя яркость
  let sum = 0;
  for (let i = 0; i < H; i++) sum += scanCol[i];
  const avgBright = sum / H;

  document.getElementById('infoLum').textContent = Math.round(avgBright);
  document.getElementById('liveLum').textContent = `lum ${Math.round(avgBright)}`;

  if (soundMode === 'raw') {
    applySoundRaw(scanCol, avgBright);
  } else {
    applySoundMusical(scanCol, avgBright);
  }
}

// ════════════════════════════════════════════
//  RAW РЕЖИМ — плавный непрерывный дрон
// ════════════════════════════════════════════
function applySoundRaw(scanCol, avgBright) {
  if (!audioCtx || !audioReady || isMuted) return;
  if (audioCtx.state !== 'running') { audioCtx.resume(); return; }

  // Сухой звук
  if (dryGain) dryGain.gain.setTargetAtTime(1.0, audioCtx.currentTime, 0.3);
  if (wetGain) wetGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.3);

  const H = scanCol.length, count = oscillators.length;
  const minFreq = parseInt(minFreqSlider.value);
  const maxFreq = parseInt(maxFreqSlider.value);
  const zoneH   = H / count;
  const now     = audioCtx.currentTime;
  const volMax  = parseFloat(volumeSlider.value) / Math.sqrt(count);

  for (let i = 0; i < count; i++) {
    const s = Math.floor(i * zoneH), e = Math.floor((i+1)*zoneH);
    let sm = 0;
    for (let y = s; y < e; y++) sm += scanCol[y];
    const b    = (sm / (e - s)) / 255;
    const freq = minFreq * Math.pow(maxFreq / minFreq, b);
    const vol  = Math.sin(b * Math.PI) * volMax;

    oscillators[i].frequency.cancelScheduledValues(now);
    oscillators[i].frequency.setValueAtTime(oscillators[i].frequency.value, now);
    oscillators[i].frequency.linearRampToValueAtTime(freq, now + 0.04);

    gainNodes[i].gain.cancelScheduledValues(now);
    gainNodes[i].gain.setValueAtTime(gainNodes[i].gain.value, now);
    gainNodes[i].gain.linearRampToValueAtTime(Math.max(0, Math.min(vol,volMax)), now + 0.04);
  }

  document.getElementById('infoMode').textContent = 'raw';
  document.getElementById('infoNote').textContent = '—';
}

// ════════════════════════════════════════════
//  MUSICAL РЕЖИМ — ambient piano
//
//  Логика совсем другая чем RAW:
//  1. Камера не управляет постоянными осцилляторами
//  2. Камера ТРИГГЕРИТ отдельные удары по клавишам
//  3. Каждый удар = полная огибающая (атака + затухание)
//  4. Между ударами — тишина (или предыдущая нота затихает)
//  5. Нота выбирается из пентатоники по яркости
// ════════════════════════════════════════════
function applySoundMusical(scanCol, avgBright) {
  if (!audioCtx || !audioReady || isMuted) return;
  if (audioCtx.state !== 'running') { audioCtx.resume(); return; }

  // Реверб включён — 40% мокрого сигнала
  if (dryGain) dryGain.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.5);
  if (wetGain) wetGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.5);

  // Тишим RAW осцилляторы — они не нужны в musical режиме
  const now = audioCtx.currentTime;
  gainNodes.forEach(g => {
    g.gain.cancelScheduledValues(now);
    g.gain.setTargetAtTime(0, now, 0.1);
  });

  const H         = scanCol.length;
  const intensity = avgBright / 255;
  const delta     = avgBright - prevBright;

  // ─── ВЫБОР НОТЫ ───
  // Средняя яркость верхних 2/3 экрана → нота мелодии
  // Нижняя 1/3 → нота баса
  let melodySum = 0;
  for (let y = 0; y < Math.floor(H * 0.67); y++) melodySum += scanCol[y];
  const melodyAvg  = melodySum / Math.floor(H * 0.67);
  const melodyNorm = melodyAvg / 255;

  // Индекс ноты — ступенчато по пентатонике
  const noteIdx = Math.min(
    Math.floor(melodyNorm * NOTE_FREQS.length),
    NOTE_FREQS.length - 1
  );

  // ─── КОГДА ИГРАТЬ НОТУ ───
  // Не каждый кадр! Только когда:
  // а) нота ИЗМЕНИЛАСЬ (камера сдвинулась на другую зону)
  // б) прошёл минимальный кулдаун
  // в) есть достаточная яркость (не полная тьма)

  if (noteCooldown > 0) noteCooldown--;

  const noteChanged   = noteIdx !== lastNoteIndex;
  const brightEnough  = melodyAvg > 20;
  const cooldownDone  = noteCooldown === 0;

  if (noteChanged && brightEnough && cooldownDone) {
    const freq     = NOTE_FREQS[noteIdx];
    const name     = NOTE_NAMES[noteIdx];
    // Velocity (сила удара) зависит от яркости — темнее = тише
    const velocity = 0.3 + melodyNorm * 0.7;

    playPianoNote(freq, name, velocity);

    lastNoteIndex = noteIdx;
    // Кулдаун: чем тише (темнее) — тем реже ноты
    // 25-50 кадров = примерно 0.4-0.8 секунды между нотами
    noteCooldown = Math.floor(25 + (1 - melodyNorm) * 25);
  }

  // ─── БАС ───
  // Играет реже — только при крупных изменениях яркости снизу
  let bassSum = 0;
  for (let y = Math.floor(H * 0.67); y < H; y++) bassSum += scanCol[y];
  const bassAvg  = bassSum / (H - Math.floor(H * 0.67));
  const bassNorm = bassAvg / 255;

  // Бас играет когда нота меняется И прошло достаточно времени
  if (noteChanged && bassAvg > 15 && noteCooldown > 22) {
    const bassNoteIdx = Math.min(Math.floor(bassNorm * BASS_NOTES.length), BASS_NOTES.length - 1);
    playBassNote(BASS_NOTES[bassNoteIdx], 0.4 + bassNorm * 0.4);
  }

  // ─── РИТМ — только лёгкий хэтчик ───
  // В ambient стиле ритм очень деликатный
  if (kickCooldown  > 0) kickCooldown--;
  if (hihatCooldown > 0) hihatCooldown--;

  // Лёгкий хэт когда яркость верхней части выше порога
  const topAvg = (() => {
    let s = 0;
    for (let y = 0; y < Math.floor(H * 0.25); y++) s += scanCol[y];
    return s / Math.floor(H * 0.25);
  })();

  // Хэт очень редкий и тихий — создаёт текстуру но не доминирует
  const hiEvery = Math.max(30, Math.floor(60 - (topAvg / 255) * 30));
  if (frameCount % hiEvery === 0 && hihatCooldown === 0 && topAvg > 40) {
    playHihat((topAvg / 255) * 0.2 * parseFloat(volumeSlider.value), false);
    hihatCooldown = 8;
  }

  // Кик — только при очень резком большом скачке яркости
  // В ambient стиле это редкость
  if (delta > 35 && kickCooldown === 0 && intensity > 0.15) {
    playKick(Math.min(delta / 80, 0.6) * parseFloat(volumeSlider.value));
    kickCooldown = 45; // долгий кулдаун — кик редко
  }

  prevBright = avgBright;
  document.getElementById('infoMode').textContent = 'musical';
}

// ════════════════════════════════════════════
//  ВИЗУАЛИЗАТОР
// ════════════════════════════════════════════
function drawVisualizer() {
  if (!analyser) return;
  const W = vizCanvas.width, H = vizCanvas.height;
  const buf = analyser.frequencyBinCount;
  const dat = new Uint8Array(buf);
  analyser.getByteFrequencyData(dat);
  vizCtx.fillStyle = '#000';
  vizCtx.fillRect(0, 0, W, H);
  for (let i = 0; i < buf; i++) {
    const v = dat[i] / 255;
    if (v < 0.015) continue;
    const x = (i / buf) * W;
    const h = v * H;
    vizCtx.fillStyle = `rgba(255,255,255,${0.2 + v * 0.8})`;
    vizCtx.fillRect(x, H - h, 1, h);
  }
  vizCtx.fillStyle = 'rgba(255,255,255,0.06)';
  vizCtx.fillRect(0, H/2, W, 1);
}

// ════════════════════════════════════════════
//  СТАТУС
// ════════════════════════════════════════════
function updateAudioStatus() {
  if (!audioCtx) { audioStatus.textContent = 'audio: —'; return; }
  audioStatus.textContent = `audio: ${audioCtx.state}`;
  audioStatus.style.color = audioCtx.state === 'running' ? 'rgba(255,255,255,0.3)' : '#f44';
  document.getElementById('infoState').textContent = audioCtx.state;
}

// ════════════════════════════════════════════
//  СТАРТ
// ════════════════════════════════════════════
async function handleStart(e) {
  e.preventDefault(); e.stopPropagation();
  if (startHandled) return;
  startHandled = true;
  await initAudio();
  startOverlay.style.display = 'none';
  // Тест-тон — одна нота C4
  if (audioCtx && masterGain) playPianoNote(261.63, 'C4', 0.5);
  await startCamera();
}

startOverlay.addEventListener('touchend', handleStart, { passive: false });
startOverlay.addEventListener('click',    handleStart);

// ════════════════════════════════════════════
//  ПЕРЕКЛЮЧЕНИЕ РЕЖИМА
// ════════════════════════════════════════════
document.querySelectorAll('.smode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    soundMode = btn.dataset.smode;
    document.querySelectorAll('.smode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (soundMode === 'musical') {
      // Сбрасываем состояние piano engine
      lastNoteIndex = -1;
      noteCooldown  = 0;
      prevBright    = 0;
    } else {
      // Возвращаем RAW осцилляторы
      if (audioCtx && audioReady) createRawOscillators();
    }
  });
});

// ════════════════════════════════════════════
//  ТИПЫ ВОЛНЫ (только для RAW)
// ════════════════════════════════════════════
document.querySelectorAll('.wave-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    waveType = btn.dataset.mode;
    document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    oscillators.forEach(o => { o.type = waveType; });
  });
});

// ════════════════════════════════════════════
//  MUTE
// ════════════════════════════════════════════
muteBtn.addEventListener('click', async () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  isMuted = !isMuted;
  muteBtn.textContent = isMuted ? '[ sound: off ]' : '[ sound: on ]';
  muteBtn.classList.toggle('active', !isMuted);
  const now = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setValueAtTime(masterGain.gain.value, now);
  masterGain.gain.linearRampToValueAtTime(
    isMuted ? 0 : parseFloat(volumeSlider.value), now + 0.1
  );
});

// ════════════════════════════════════════════
//  КАМЕРА
// ════════════════════════════════════════════
camBtn.addEventListener('click', async () => {
  useFrontCam = !useFrontCam;
  camBtn.textContent = useFrontCam ? '[ cam: front ]' : '[ cam: rear ]';
  if (isRunning) {
    cancelAnimationFrame(animId);
    isRunning = false;
    await startCamera();
  }
});

// ════════════════════════════════════════════
//  СЛАЙДЕРЫ
// ════════════════════════════════════════════
volumeSlider.addEventListener('input', () => {
  document.getElementById('volVal').textContent = Math.round(volumeSlider.value * 100) + '%';
  if (masterGain && !isMuted) {
    const now = audioCtx.currentTime;
    masterGain.gain.setValueAtTime(masterGain.gain.value, now);
    masterGain.gain.linearRampToValueAtTime(parseFloat(volumeSlider.value), now + 0.05);
  }
});
voicesSlider.addEventListener('input', () => {
  document.getElementById('voiceVal').textContent = voicesSlider.value;
});
voicesSlider.addEventListener('change', () => {
  if (audioCtx && audioReady && soundMode === 'raw') createRawOscillators();
});
minFreqSlider.addEventListener('input', () => {
  document.getElementById('minVal').textContent = minFreqSlider.value;
});
maxFreqSlider.addEventListener('input', () => {
  document.getElementById('maxVal').textContent = maxFreqSlider.value;
});

// ════════════════════════════════════════════
//  iOS ФОНОВЫЕ ФИКСЫ
// ════════════════════════════════════════════
document.addEventListener('touchstart', async () => {
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume(); updateAudioStatus();
  }
}, { passive: true });

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && audioCtx) {
    await audioCtx.resume(); updateAudioStatus();
  }
});
</script>
