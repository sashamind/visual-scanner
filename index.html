<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visual Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 12px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #00ffcc;
      margin-bottom: 4px;
      text-shadow: 0 0 20px #00ffcc88;
    }

    .subtitle {
      font-size: 0.65rem;
      color: #556;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .scanner-wrapper {
      position: relative;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4/3;
      border: 1px solid #1a2a2a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px #00ffcc22;
    }

    #video { display: none; }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #offscreen { display: none; }

    .scan-line {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #00ffcc, #00ffcc, transparent);
      box-shadow: 0 0 12px #00ffcc, 0 0 30px #00ffcc88;
      pointer-events: none;
      z-index: 10;
    }

    .scan-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: #00ffcc;
      z-index: 11;
    }
    .scan-label.top { top: 8px; }
    .scan-label.bot { bottom: 8px; }

    #startOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      border-radius: 12px;
      gap: 12px;
    }

    #startOverlay .big-icon { font-size: 3rem; }

    #startOverlay .tap-text {
      font-size: 1rem;
      letter-spacing: 3px;
      color: #00ffcc;
      text-transform: uppercase;
    }

    #startOverlay .tap-sub {
      font-size: 0.7rem;
      color: #556;
      letter-spacing: 1px;
    }

    #startOverlay .pulse {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #00ffcc44;
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2);   opacity: 0; }
    }

    /* Статус AudioContext — показываем на экране для отладки */
    #audioStatus {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.55rem;
      background: #00000088;
      padding: 4px 8px;
      border-radius: 6px;
      z-index: 15;
      letter-spacing: 1px;
    }

    #vizCanvas {
      width: 100%;
      max-width: 640px;
      height: 70px;
      border-radius: 0 0 12px 12px;
      background: #05080f;
      display: block;
      border-top: 1px solid #0f2020;
    }

    .controls {
      margin-top: 12px;
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .big-btn {
      padding: 14px;
      border: 1px solid #00ffcc55;
      border-radius: 10px;
      background: transparent;
      color: #00ffcc;
      font-size: 0.85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      min-height: 52px;
    }
    .big-btn:active {
      background: #00ffcc22;
      transform: scale(0.97);
    }
    .big-btn.active {
      background: #00ffcc;
      color: #000;
    }

    .sliders-grid {
      margin-top: 10px;
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #0d1117;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #1a2a2a;
    }

    .slider-group label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #556;
      text-transform: uppercase;
    }

    .slider-group .value {
      font-size: 0.75rem;
      color: #00ffcc;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #1a2a2a;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00ffcc;
      cursor: pointer;
      box-shadow: 0 0 8px #00ffcc;
    }

    .modes-row {
      margin-top: 10px;
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .mode-btn {
      padding: 12px 6px;
      border: 1px solid #1a2a2a;
      border-radius: 10px;
      background: transparent;
      color: #556;
      font-size: 0.75rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 48px;
    }
    .mode-btn:active { transform: scale(0.95); }
    .mode-btn.active {
      border-color: #00ffcc55;
      color: #00ffcc;
      background: #00ffcc11;
    }

    #status {
      margin-top: 10px;
      font-size: 0.65rem;
      color: #556;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 10px;
      min-height: 18px;
    }

    .info-row {
      margin-top: 8px;
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      font-size: 0.65rem;
      color: #334;
      letter-spacing: 1px;
    }
    .info-row span { color: #00ffcc99; }
  </style>
</head>
<body>

  <h1>⬛ Visual Scanner</h1>
  <p class="subtitle">camera → grayscale → sound</p>

  <div class="scanner-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <canvas id="offscreen" width="640" height="480"></canvas>
    <div class="scan-line"></div>
    <div class="scan-label top">SCAN</div>
    <div class="scan-label bot">SCAN</div>

    <!-- Статус звука — виден поверх камеры -->
    <div id="audioStatus" style="color:#556">⏳ audio init</div>

    <div id="startOverlay">
      <div class="pulse"></div>
      <div class="big-icon">📷</div>
      <div class="tap-text">Tap to Start</div>
      <div class="tap-sub">камера + звук</div>
    </div>
  </div>

  <canvas id="vizCanvas" width="640" height="70"></canvas>

  <div class="controls">
    <button class="big-btn" id="muteBtn">🔊 Звук вкл</button>
    <button class="big-btn" id="camBtn">🔄 Тыльная кам.</button>
  </div>

  <div class="modes-row">
    <button class="mode-btn active" data-mode="sine">SINE</button>
    <button class="mode-btn" data-mode="triangle">TRI</button>
    <button class="mode-btn" data-mode="sawtooth">SAW</button>
    <button class="mode-btn" data-mode="square">SQR</button>
  </div>

  <div class="sliders-grid">
    <div class="slider-group">
      <label>Громкость</label>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
      <div class="value" id="volVal">70%</div>
    </div>
    <div class="slider-group">
      <label>Голоса</label>
      <input type="range" id="voicesSlider" min="1" max="16" step="1" value="8">
      <div class="value" id="voiceVal">8</div>
    </div>
    <div class="slider-group">
      <label>Мин. Гц</label>
      <input type="range" id="minFreqSlider" min="50" max="500" step="10" value="100">
      <div class="value" id="minVal">100 Hz</div>
    </div>
    <div class="slider-group">
      <label>Макс. Гц</label>
      <input type="range" id="maxFreqSlider" min="500" max="4000" step="50" value="2000">
      <div class="value" id="maxVal">2000 Hz</div>
    </div>
  </div>

  <div class="info-row">
    Яркость: <span id="infoAvg">—</span> &nbsp;|&nbsp;
    Режим: <span id="infoMode">sine</span>
  </div>

  <div id="status">Нажми на экран камеры для старта</div>

<script>
// ————————————————————————————————————————————
//  ЭЛЕМЕНТЫ
// ————————————————————————————————————————————
const video        = document.getElementById('video');
const canvas       = document.getElementById('canvas');
const offscreen    = document.getElementById('offscreen');
const vizCanvas    = document.getElementById('vizCanvas');
const startOverlay = document.getElementById('startOverlay');
const muteBtn      = document.getElementById('muteBtn');
const camBtn       = document.getElementById('camBtn');
const statusEl     = document.getElementById('status');
const audioStatus  = document.getElementById('audioStatus');
const infoAvg      = document.getElementById('infoAvg');
const infoMode     = document.getElementById('infoMode');

const volumeSlider  = document.getElementById('volumeSlider');
const voicesSlider  = document.getElementById('voicesSlider');
const minFreqSlider = document.getElementById('minFreqSlider');
const maxFreqSlider = document.getElementById('maxFreqSlider');

const ctx    = canvas.getContext('2d');
const offCtx = offscreen.getContext('2d');
const vizCtx = vizCanvas.getContext('2d');

// ————————————————————————————————————————————
//  СОСТОЯНИЕ
// ————————————————————————————————————————————
let audioCtx    = null;
let masterGain  = null;
let analyser    = null;
let oscillators = [];
let gainNodes   = [];
let isMuted     = false;
let isRunning   = false;
let waveType    = 'sine';
let animId      = null;
let useFrontCam = false; // тыльная по умолчанию — лучше для сканирования

// ————————————————————————————————————————————
//  iOS ФИКС: "разбудить" аудио коротким пустым звуком
//  iOS блокирует аудио пока не воспроизведёт хоть что-то
//  в момент пользовательского действия
// ————————————————————————————————————————————
function unlockAudioiOS(ctx) {
  // Создаём пустой буфер (0.001 секунды тишины)
  const buffer = ctx.createBuffer(1, 1, 22050);
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);
  source.start(0);      // Воспроизводим прямо сейчас
  source.stop(0.001);   // И сразу останавливаем
  // Этот трюк "разблокирует" аудио на iOS
}

// ————————————————————————————————————————————
//  ИНИЦИАЛИЗАЦИЯ АУДИО — вызывать ТОЛЬКО внутри тапа!
// ————————————————————————————————————————————
async function initAudio() {
  if (audioCtx) {
    // Уже создан — просто возобновляем если спал
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
    updateAudioStatus();
    return;
  }

  // Создаём AudioContext (это синтезатор звука браузера)
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // === ГЛАВНЫЙ ФИКС ДЛЯ iOS ===
  // Сразу разблокируем через пустой звук
  unlockAudioiOS(audioCtx);

  // Возобновляем если сразу ушёл в suspended
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  // Анализатор для визуализатора
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  // Главная громкость
  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(volumeSlider.value);

  // Цепочка: осцилляторы → анализатор → громкость → колонки
  analyser.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  // Создаём осцилляторы
  createOscillators();
  updateAudioStatus();
}

// ————————————————————————————————————————————
//  ПОКАЗЫВАЕМ СТАТУС АУДИО НА ЭКРАНЕ
//  Помогает понять что происходит на iPhone
// ————————————————————————————————————————————
function updateAudioStatus() {
  if (!audioCtx) {
    audioStatus.style.color = '#556';
    audioStatus.textContent = '⏳ audio init';
    return;
  }
  if (audioCtx.state === 'running') {
    audioStatus.style.color = '#00ffcc';
    audioStatus.textContent = '🔊 audio: OK';
  } else {
    audioStatus.style.color = '#ff6644';
    audioStatus.textContent = '⚠ audio: ' + audioCtx.state;
  }
}

// ————————————————————————————————————————————
//  СОЗДАНИЕ ОСЦИЛЛЯТОРОВ
// ————————————————————————————————————————————
function createOscillators() {
  const count = parseInt(voicesSlider.value);

  // Останавливаем старые
  oscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
  oscillators = [];
  gainNodes   = [];

  for (let i = 0; i < count; i++) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = waveType;
    osc.frequency.value = 200 + i * 50; // Разные начальные частоты

    // Начинаем с нуля
    gain.gain.setValueAtTime(0, audioCtx.currentTime);

    osc.connect(gain);
    gain.connect(analyser);
    osc.start(); // Запускаем сразу — пока тихо

    oscillators.push(osc);
    gainNodes.push(gain);
  }
}

// ————————————————————————————————————————————
//  ЗАПУСК КАМЕРЫ
// ————————————————————————————————————————————
async function startCamera() {
  // Останавливаем предыдущий поток
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  try {
    const constraints = {
      video: {
        facingMode: useFrontCam ? 'user' : 'environment',
        width:  { ideal: 1280 },
        height: { ideal: 960  }
      },
      audio: false
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;

    // Ждём пока видео загрузится
    await new Promise(resolve => {
      video.onloadedmetadata = resolve;
    });
    await video.play();

    statusEl.textContent = 'Наведи на узор — линия читает яркость и создаёт звук';
    isRunning = true;
    scanLoop();

  } catch (err) {
    statusEl.textContent = '⚠ Камера: ' + err.message;
    console.error(err);
  }
}

// ————————————————————————————————————————————
//  ГЛАВНЫЙ ЦИКЛ
// ————————————————————————————————————————————
function scanLoop() {
  if (!isRunning) return;

  // Проверяем что видео реально играет
  if (video.readyState >= 2) {
    offCtx.drawImage(video, 0, 0, 640, 480);
    const frame = offCtx.getImageData(0, 0, 640, 480);
    drawGrayscaleAndScan(frame.data);
    drawVisualizer();
  }

  animId = requestAnimationFrame(scanLoop);
}

// ————————————————————————————————————————————
//  ЧБ + СКАНИРОВАНИЕ
// ————————————————————————————————————————————
function drawGrayscaleAndScan(data) {
  const W = 640, H = 480;
  const output     = ctx.createImageData(W, H);
  const out        = output.data;
  const scanX      = Math.floor(W / 2);
  const scanWidth  = 5;
  const scanColumn = new Float32Array(H);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx  = (y * W + x) * 4;
      const gray = 0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2];

      if (x >= scanX - scanWidth && x <= scanX + scanWidth) {
        scanColumn[y] = gray;
      }

      out[idx] = out[idx+1] = out[idx+2] = gray;
      out[idx+3] = 255;
    }
  }

  ctx.putImageData(output, 0, 0);

  // Виньетка
  const grad = ctx.createRadialGradient(320,240,150, 320,240,370);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  applySound(scanColumn);
}

// ————————————————————————————————————————————
//  ЗВУК
// ————————————————————————————————————————————
function applySound(scanColumn) {
  if (!audioCtx || isMuted) return;

  // Каждый раз проверяем и возобновляем если нужно
  if (audioCtx.state !== 'running') {
    audioCtx.resume().then(updateAudioStatus);
    return;
  }

  const H       = scanColumn.length;
  const count   = oscillators.length;
  const minFreq = parseInt(minFreqSlider.value);
  const maxFreq = parseInt(maxFreqSlider.value);
  const zoneH   = H / count;
  const volMax  = parseFloat(volumeSlider.value) / count * 1.5;

  let avgBrightness = 0;
  const now = audioCtx.currentTime;

  for (let i = 0; i < count; i++) {
    const zoneStart = Math.floor(i * zoneH);
    const zoneEnd   = Math.floor((i + 1) * zoneH);

    let sum = 0;
    for (let y = zoneStart; y < zoneEnd; y++) sum += scanColumn[y];
    const avg = sum / (zoneEnd - zoneStart);
    avgBrightness += avg;

    const brightness = avg / 255; // 0..1

    // Частота: тёмный → низко, светлый → высоко (логарифм = музыкальнее)
    const freq = minFreq * Math.pow(maxFreq / minFreq, brightness);

    // Громкость этого голоса
    const vol = brightness * (1 - brightness * 0.4) * volMax * 2;

    // Используем setValueAtTime + linearRampToValueAtTime
    // вместо setTargetAtTime — лучше работает на iOS Safari
    oscillators[i].frequency.cancelScheduledValues(now);
    oscillators[i].frequency.setValueAtTime(oscillators[i].frequency.value, now);
    oscillators[i].frequency.linearRampToValueAtTime(freq, now + 0.05);

    gainNodes[i].gain.cancelScheduledValues(now);
    gainNodes[i].gain.setValueAtTime(gainNodes[i].gain.value, now);
    gainNodes[i].gain.linearRampToValueAtTime(
      Math.min(vol, volMax),
      now + 0.08 // плавное нарастание — 80мс
    );
  }

  infoAvg.textContent = Math.round(avgBrightness / count);
}

// ————————————————————————————————————————————
//  ВИЗУАЛИЗАТОР
// ————————————————————————————————————————————
function drawVisualizer() {
  if (!analyser) return;

  const W = vizCanvas.width;
  const H = vizCanvas.height;
  const bufLen  = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(dataArr);

  vizCtx.fillStyle = '#05080f';
  vizCtx.fillRect(0, 0, W, H);

  const bw = W / bufLen * 2.5;
  let x = 0;

  for (let i = 0; i < bufLen; i++) {
    const v    = dataArr[i];
    const barH = (v / 255) * H * 0.9;
    vizCtx.fillStyle = `hsl(${160 + (v/255)*40}, 80%, ${20 + (v/255)*50}%)`;
    vizCtx.fillRect(x, (H - barH) / 2, bw - 1, barH);
    x += bw + 1;
    if (x > W) break;
  }
}

// ————————————————————————————————————————————
//  ТАП НА ОВЕРЛЕЙ — главный старт
// ————————————————————————————————————————————
startOverlay.addEventListener('touchend', handleStart, { passive: false });
startOverlay.addEventListener('click', handleStart);

async function handleStart(e) {
  e.preventDefault(); // Блокируем двойной вызов click после touchend

  // Инициализируем аудио ВНУТРИ обработчика — iOS требует именно этого
  await initAudio();

  // Прячем оверлей
  startOverlay.style.display = 'none';

  // Запускаем камеру
  await startCamera();
}

// ————————————————————————————————————————————
//  КНОПКА MUTE
// ————————————————————————————————————————————
muteBtn.addEventListener('click', async () => {
  // Если аудио ещё не создано — создаём
  if (!audioCtx) await initAudio();

  isMuted = !isMuted;
  muteBtn.textContent = isMuted ? '🔇 Звук выкл' : '🔊 Звук вкл';
  muteBtn.classList.toggle('active', isMuted);

  const now = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setValueAtTime(masterGain.gain.value, now);
  masterGain.gain.linearRampToValueAtTime(
    isMuted ? 0 : parseFloat(volumeSlider.value),
    now + 0.1
  );
});

// ————————————————————————————————————————————
//  ПЕРЕКЛЮЧЕНИЕ КАМЕРЫ
// ————————————————————————————————————————————
camBtn.addEventListener('click', async () => {
  useFrontCam = !useFrontCam;
  camBtn.textContent = useFrontCam ? '🔄 Фронт. камера' : '🔄 Тыльная кам.';
  if (isRunning) {
    cancelAnimationFrame(animId);
    isRunning = false;
    await startCamera();
  }
});

// ————————————————————————————————————————————
//  СЛАЙДЕРЫ
// ————————————————————————————————————————————
volumeSlider.addEventListener('input', () => {
  document.getElementById('volVal').textContent = Math.round(volumeSlider.value * 100) + '%';
  if (masterGain && !isMuted) {
    const now = audioCtx.currentTime;
    masterGain.gain.setValueAtTime(masterGain.gain.value, now);
    masterGain.gain.linearRampToValueAtTime(parseFloat(volumeSlider.value), now + 0.05);
  }
});

voicesSlider.addEventListener('input', () => {
  document.getElementById('voiceVal').textContent = voicesSlider.value;
});
voicesSlider.addEventListener('change', () => {
  if (audioCtx) createOscillators();
});

minFreqSlider.addEventListener('input', () => {
  document.getElementById('minVal').textContent = minFreqSlider.value + ' Hz';
});
maxFreqSlider.addEventListener('input', () => {
  document.getElementById('maxVal').textContent = maxFreqSlider.value + ' Hz';
});

// ————————————————————————————————————————————
//  РЕЖИМЫ ВОЛНЫ
// ————————————————————————————————————————————
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    waveType = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    oscillators.forEach(osc => { osc.type = waveType; });
    infoMode.textContent = waveType;
  });
});

// ————————————————————————————————————————————
//  ФИКС: возобновляем звук когда возвращаемся на вкладку
//  На iOS звук "засыпает" если свернуть Safari
// ————————————————————————————————————————————
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && audioCtx) {
    await audioCtx.resume();
    updateAudioStatus();
  }
});

// Дополнительный фикс — тап в любом месте экрана возобновляет аудио
document.addEventListener('touchstart', async () => {
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume();
    updateAudioStatus();
  }
}, { passive: true });
</script>
</body>
</html>
