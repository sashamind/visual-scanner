<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visual Scanner</title>
  <style>
    /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; /* убираем синюю вспышку при тапе на iOS */
    }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available; /* фикс высоты на iOS Safari */
      padding: 12px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #00ffcc;
      margin-bottom: 4px;
      text-shadow: 0 0 20px #00ffcc88;
    }

    .subtitle {
      font-size: 0.65rem;
      color: #556;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* ===== ОБЁРТКА КАМЕРЫ — занимает всю доступную ширину ===== */
    .scanner-wrapper {
      position: relative;
      width: 100%;
      max-width: 640px;
      /* Соотношение сторон 4:3 для камеры */
      aspect-ratio: 4/3;
      border: 1px solid #1a2a2a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px #00ffcc22;
    }

    #video {
      display: none;
    }

    /* Canvas растягивается на всю обёртку */
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #offscreen {
      display: none;
    }

    /* ===== ЛИНИЯ СКАНЕРА ===== */
    .scan-line {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #00ffcc, #00ffcc, transparent);
      box-shadow: 0 0 12px #00ffcc, 0 0 30px #00ffcc88;
      pointer-events: none;
      z-index: 10;
    }

    .scan-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: #00ffcc;
      z-index: 11;
    }
    .scan-label.top { top: 8px; }
    .scan-label.bot { bottom: 8px; }

    /* ===== ОВЕРЛЕЙ "TAP TO START" — поверх камеры ===== */
    #startOverlay {
      position: absolute;
      inset: 0; /* растягиваем на весь родитель */
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      border-radius: 12px;
      gap: 12px;
    }

    #startOverlay .big-icon {
      font-size: 3rem;
    }

    #startOverlay .tap-text {
      font-size: 1rem;
      letter-spacing: 3px;
      color: #00ffcc;
      text-transform: uppercase;
    }

    #startOverlay .tap-sub {
      font-size: 0.7rem;
      color: #556;
      letter-spacing: 1px;
    }

    /* Пульсирующий круг вокруг иконки */
    #startOverlay .pulse {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #00ffcc44;
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2);   opacity: 0; }
    }

    /* ===== ВИЗУАЛИЗАТОР ===== */
    #vizCanvas {
      width: 100%;
      max-width: 640px;
      height: 70px;
      border-radius: 0 0 12px 12px;
      background: #05080f;
      display: block;
      border-top: 1px solid #0f2020;
    }

    /* ===== ПАНЕЛЬ УПРАВЛЕНИЯ — сетка для мобильного ===== */
    .controls {
      margin-top: 12px;
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr; /* две колонки */
      gap: 10px;
    }

    /* Большие кнопки — удобно тапать пальцем */
    .big-btn {
      padding: 14px;
      border: 1px solid #00ffcc55;
      border-radius: 10px;
      background: transparent;
      color: #00ffcc;
      font-size: 0.85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      min-height: 52px; /* минимальная высота для пальца */
    }
    .big-btn:active {
      background: #00ffcc22;
      transform: scale(0.97);
    }
    .big-btn.active {
      background: #00ffcc;
      color: #000;
    }

    /* ===== СЛАЙДЕРЫ — на всю ширину ===== */
    .sliders-grid {
      margin-top: 10px;
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #0d1117;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #1a2a2a;
    }

    .slider-group label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #556;
      text-transform: uppercase;
    }

    .slider-group .value {
      font-size: 0.75rem;
      color: #00ffcc;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #1a2a2a;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; /* крупнее для пальца */
      height: 20px;
      border-radius: 50%;
      background: #00ffcc;
      cursor: pointer;
      box-shadow: 0 0 8px #00ffcc;
    }

    /* ===== РЕЖИМЫ ЗВУКА ===== */
    .modes-row {
      margin-top: 10px;
      width: 100%;
      max-width: 640px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .mode-btn {
      padding: 12px 6px;
      border: 1px solid #1a2a2a;
      border-radius: 10px;
      background: transparent;
      color: #556;
      font-size: 0.75rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 48px;
    }
    .mode-btn:active { transform: scale(0.95); }
    .mode-btn.active {
      border-color: #00ffcc55;
      color: #00ffcc;
      background: #00ffcc11;
    }

    /* ===== СТАТУС ===== */
    #status {
      margin-top: 10px;
      font-size: 0.65rem;
      color: #556;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 10px;
      min-height: 18px;
    }

    /* ===== ИНФО-СТРОКА ===== */
    .info-row {
      margin-top: 8px;
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      font-size: 0.65rem;
      color: #334;
      letter-spacing: 1px;
    }
    .info-row span { color: #00ffcc99; }

  </style>
</head>
<body>

  <h1>⬛ Visual Scanner</h1>
  <p class="subtitle">camera → grayscale → sound</p>

  <!-- ===== КАМЕРА ===== -->
  <div class="scanner-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <canvas id="offscreen" width="640" height="480"></canvas>
    <div class="scan-line"></div>
    <div class="scan-label top">SCAN</div>
    <div class="scan-label bot">SCAN</div>

    <!-- Оверлей — нажми чтобы начать (нужен для разблокировки звука) -->
    <div id="startOverlay">
      <div class="pulse"></div>
      <div class="big-icon">📷</div>
      <div class="tap-text">Tap to Start</div>
      <div class="tap-sub">камера + звук</div>
    </div>
  </div>

  <!-- Визуализатор частот -->
  <canvas id="vizCanvas" width="640" height="70"></canvas>

  <!-- ===== КНОПКИ ===== -->
  <div class="controls">
    <button class="big-btn" id="muteBtn">🔊 Звук вкл</button>
    <button class="big-btn" id="camBtn">🔄 Фронт. камера</button>
  </div>

  <!-- ===== РЕЖИМЫ ЗВУКА ===== -->
  <div class="modes-row">
    <button class="mode-btn active" data-mode="sine">SINE</button>
    <button class="mode-btn" data-mode="triangle">TRI</button>
    <button class="mode-btn" data-mode="sawtooth">SAW</button>
    <button class="mode-btn" data-mode="square">SQR</button>
  </div>

  <!-- ===== СЛАЙДЕРЫ ===== -->
  <div class="sliders-grid">

    <div class="slider-group">
      <label>Громкость</label>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
      <div class="value" id="volVal">70%</div>
    </div>

    <div class="slider-group">
      <label>Голоса</label>
      <input type="range" id="voicesSlider" min="1" max="16" step="1" value="8">
      <div class="value" id="voiceVal">8</div>
    </div>

    <div class="slider-group">
      <label>Мин. Гц</label>
      <input type="range" id="minFreqSlider" min="50" max="500" step="10" value="100">
      <div class="value" id="minVal">100 Hz</div>
    </div>

    <div class="slider-group">
      <label>Макс. Гц</label>
      <input type="range" id="maxFreqSlider" min="500" max="4000" step="50" value="2000">
      <div class="value" id="maxVal">2000 Hz</div>
    </div>

  </div>

  <!-- Инфо -->
  <div class="info-row">
    Яркость: <span id="infoAvg">—</span> &nbsp;|&nbsp;
    Режим: <span id="infoMode">sine</span>
  </div>

  <div id="status">Нажми на экран камеры для старта</div>

<!-- ===== JAVASCRIPT ===== -->
<script>
// ————————————————————————————————————————————
//  ЭЛЕМЕНТЫ СТРАНИЦЫ
// ————————————————————————————————————————————
const video         = document.getElementById('video');
const canvas        = document.getElementById('canvas');
const offscreen     = document.getElementById('offscreen');
const vizCanvas     = document.getElementById('vizCanvas');
const startOverlay  = document.getElementById('startOverlay');
const muteBtn       = document.getElementById('muteBtn');
const camBtn        = document.getElementById('camBtn');
const statusEl      = document.getElementById('status');
const infoAvg       = document.getElementById('infoAvg');
const infoMode      = document.getElementById('infoMode');

const volumeSlider  = document.getElementById('volumeSlider');
const voicesSlider  = document.getElementById('voicesSlider');
const minFreqSlider = document.getElementById('minFreqSlider');
const maxFreqSlider = document.getElementById('maxFreqSlider');

const ctx    = canvas.getContext('2d');
const offCtx = offscreen.getContext('2d');
const vizCtx = vizCanvas.getContext('2d');

// ————————————————————————————————————————————
//  СОСТОЯНИЕ
// ————————————————————————————————————————————
let audioCtx    = null;
let masterGain  = null;
let analyser    = null;
let oscillators = [];
let gainNodes   = [];
let isMuted     = false;
let isRunning   = false;
let waveType    = 'sine';
let animId      = null;
let useFrontCam = true; // По умолчанию фронтальная — удобнее на телефоне

// ————————————————————————————————————————————
//  ИНИЦИАЛИЗАЦИЯ АУДИО
//  ВАЖНО: вызывается только после тапа пользователя!
//  Браузер блокирует звук без действия пользователя
// ————————————————————————————————————————————
function initAudio() {
  if (audioCtx) return; // уже создан — не создаём снова

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(volumeSlider.value);

  analyser.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  createOscillators();
}

// ————————————————————————————————————————————
//  СОЗДАНИЕ ОСЦИЛЛЯТОРОВ (генераторов тона)
// ————————————————————————————————————————————
function createOscillators() {
  const count = parseInt(voicesSlider.value);

  oscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
  oscillators = [];
  gainNodes   = [];

  for (let i = 0; i < count; i++) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type            = waveType;
    osc.frequency.value = 200;
    gain.gain.value     = 0;

    osc.connect(gain);
    gain.connect(analyser);
    osc.start();

    oscillators.push(osc);
    gainNodes.push(gain);
  }
}

// ————————————————————————————————————————————
//  ЗАПУСК КАМЕРЫ
// ————————————————————————————————————————————
async function startCamera() {
  // Останавливаем предыдущий поток если был
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: useFrontCam ? 'user' : 'environment', // user = фронт, environment = тыл
        width:  { ideal: 1280 },
        height: { ideal: 960  }
      },
      audio: false
    });

    video.srcObject = stream;
    await video.play();

    statusEl.textContent = 'Наведи на штрихкод, узор или вид — центральная линия создаёт звук';
    isRunning = true;
    scanLoop();

  } catch (err) {
    statusEl.textContent = '⚠ Нет доступа к камере: ' + err.message;
  }
}

// ————————————————————————————————————————————
//  ГЛАВНЫЙ ЦИКЛ СКАНИРОВАНИЯ
// ————————————————————————————————————————————
function scanLoop() {
  if (!isRunning) return;

  // Рисуем кадр с камеры на невидимый canvas
  offCtx.drawImage(video, 0, 0, 640, 480);

  // Читаем пиксели
  const frame = offCtx.getImageData(0, 0, 640, 480);
  drawGrayscaleAndScan(frame.data);
  drawVisualizer();

  animId = requestAnimationFrame(scanLoop);
}

// ————————————————————————————————————————————
//  ПЕРЕВОД В ЧБ + СЧИТЫВАНИЕ ПОЛОСЫ
// ————————————————————————————————————————————
function drawGrayscaleAndScan(data) {
  const W = 640;
  const H = 480;

  const output = ctx.createImageData(W, H);
  const out    = output.data;

  const scanX     = Math.floor(W / 2);
  const scanWidth = 5;
  const scanColumn = new Float32Array(H);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx  = (y * W + x) * 4;
      const r    = data[idx];
      const g    = data[idx + 1];
      const b    = data[idx + 2];
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;

      if (x >= scanX - scanWidth && x <= scanX + scanWidth) {
        scanColumn[y] = gray;
      }

      out[idx]     = gray;
      out[idx + 1] = gray;
      out[idx + 2] = gray;
      out[idx + 3] = 255;
    }
  }

  ctx.putImageData(output, 0, 0);

  // Виньетка для красоты
  const gradient = ctx.createRadialGradient(320, 240, 150, 320, 240, 370);
  gradient.addColorStop(0, 'transparent');
  gradient.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  applySound(scanColumn);
}

// ————————————————————————————————————————————
//  ПРИМЕНЕНИЕ ЗВУКА
// ————————————————————————————————————————————
function applySound(scanColumn) {
  if (!audioCtx || isMuted) {
    gainNodes.forEach(g => g.gain.setTargetAtTime(0, audioCtx?.currentTime || 0, 0.1));
    return;
  }

  // Если AudioContext был приостановлен — возобновляем
  // Это нужно на iOS где контекст может засыпать
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const H        = scanColumn.length;
  const count    = oscillators.length;
  const minFreq  = parseInt(minFreqSlider.value);
  const maxFreq  = parseInt(maxFreqSlider.value);
  const volScale = 1 / count;
  const zoneH    = H / count;

  let avgBrightness = 0;

  for (let i = 0; i < count; i++) {
    const zoneStart = Math.floor(i * zoneH);
    const zoneEnd   = Math.floor((i + 1) * zoneH);

    let sum = 0;
    for (let y = zoneStart; y < zoneEnd; y++) {
      sum += scanColumn[y];
    }
    const avgZone  = sum / (zoneEnd - zoneStart);
    avgBrightness += avgZone;

    const brightness = avgZone / 255;
    const freq = minFreq * Math.pow(maxFreq / minFreq, brightness);

    oscillators[i].frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);

    const vol = brightness * (1 - brightness * 0.3) * volScale * 2;
    gainNodes[i].gain.setTargetAtTime(
      Math.min(vol, volScale),
      audioCtx.currentTime,
      0.3
    );
  }

  infoAvg.textContent = Math.round(avgBrightness / count);
}

// ————————————————————————————————————————————
//  ВИЗУАЛИЗАТОР
// ————————————————————————————————————————————
function drawVisualizer() {
  if (!analyser) return;

  const W = vizCanvas.width;
  const H = vizCanvas.height;

  const bufferLength = analyser.frequencyBinCount;
  const dataArray    = new Uint8Array(bufferLength);
  analyser.getByteFrequencyData(dataArray);

  vizCtx.fillStyle = '#05080f';
  vizCtx.fillRect(0, 0, W, H);

  const barWidth = W / bufferLength * 2.5;
  let x = 0;

  for (let i = 0; i < bufferLength; i++) {
    const value = dataArray[i];
    const barH  = (value / 255) * H * 0.9;
    const hue   = 160 + (value / 255) * 40;
    vizCtx.fillStyle = `hsl(${hue}, 80%, ${20 + (value / 255) * 50}%)`;
    vizCtx.fillRect(x, (H - barH) / 2, barWidth - 1, barH);
    x += barWidth + 1;
    if (x > W) break;
  }
}

// ————————————————————————————————————————————
//  ТАП НА ОВЕРЛЕЙ — запускаем всё
//  Это КЛЮЧЕВОЙ момент для звука на мобильных:
//  AudioContext должен создаться внутри обработчика тапа
// ————————————————————————————————————————————
startOverlay.addEventListener('click', async () => {
  // Сначала инициализируем аудио (внутри тапа — браузер разрешит)
  initAudio();

  // Явно возобновляем AudioContext
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  // Прячем оверлей
  startOverlay.style.display = 'none';

  // Запускаем камеру
  await startCamera();
});

// ————————————————————————————————————————————
//  КНОПКА ЗВУК ВКЛ/ВЫКЛ
// ————————————————————————————————————————————
muteBtn.addEventListener('click', () => {
  if (!audioCtx) return;
  isMuted = !isMuted;
  muteBtn.textContent = isMuted ? '🔇 Звук выкл' : '🔊 Звук вкл';
  muteBtn.classList.toggle('active', isMuted);
  masterGain.gain.setTargetAtTime(
    isMuted ? 0 : parseFloat(volumeSlider.value),
    audioCtx.currentTime,
    0.1
  );
});

// ————————————————————————————————————————————
//  КНОПКА ПЕРЕКЛЮЧЕНИЯ КАМЕРЫ (фронт / тыл)
// ————————————————————————————————————————————
camBtn.addEventListener('click', async () => {
  useFrontCam = !useFrontCam;
  camBtn.textContent = useFrontCam ? '🔄 Фронт. камера' : '🔄 Тыльная камера';
  if (isRunning) {
    cancelAnimationFrame(animId);
    isRunning = false;
    await startCamera();
  }
});

// ————————————————————————————————————————————
//  СЛАЙДЕРЫ
// ————————————————————————————————————————————
volumeSlider.addEventListener('input', () => {
  document.getElementById('volVal').textContent = Math.round(volumeSlider.value * 100) + '%';
  if (masterGain && !isMuted) {
    masterGain.gain.setTargetAtTime(parseFloat(volumeSlider.value), audioCtx.currentTime, 0.05);
  }
});

voicesSlider.addEventListener('input', () => {
  document.getElementById('voiceVal').textContent = voicesSlider.value;
});
voicesSlider.addEventListener('change', () => {
  if (audioCtx) createOscillators();
});

minFreqSlider.addEventListener('input', () => {
  document.getElementById('minVal').textContent = minFreqSlider.value + ' Hz';
});
maxFreqSlider.addEventListener('input', () => {
  document.getElementById('maxVal').textContent = maxFreqSlider.value + ' Hz';
});

// ————————————————————————————————————————————
//  РЕЖИМЫ ВОЛНЫ
// ————————————————————————————————————————————
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    waveType = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    oscillators.forEach(osc => { osc.type = waveType; });
    infoMode.textContent = waveType;
  });
});

// ————————————————————————————————————————————
//  ФИКС ДЛЯ iOS: возобновляем звук если страница
//  была свёрнута и снова открыта
// ————————————————————————————————————————————
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && audioCtx) {
    audioCtx.resume();
  }
});
</script>
</body>
</html>
